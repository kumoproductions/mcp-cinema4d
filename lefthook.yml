# https://lefthook.dev/configuration/
# Run `npx lefthook install` once after cloning to register the hooks.
#
# Python hooks need `uv` on PATH (https://docs.astral.sh/uv/). `uvx` downloads
# ruff on first run and caches the binary — no explicit install step needed.

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{ts,tsx,js,mjs,cjs}"
      run: npx oxlint {staged_files}

    - name: oxfmt
      glob: "*.{ts,tsx,js,mjs,cjs,json,jsonc,md,yml,yaml}"
      stage_fixed: true
      run: npx oxfmt --no-error-on-unmatched-pattern {staged_files}

    - name: ruff-lint
      glob: "*.{py,pyp}"
      run: uvx ruff@0.15.11 check {staged_files}

    - name: ruff-format
      glob: "*.{py,pyp}"
      stage_fixed: true
      run: uvx ruff@0.15.11 format {staged_files}

    # Guard against CRLF sneaking in on Windows checkouts. Auto-fix via
    # stage_fixed; bail if a file has unstaged changes so `git add -p` selections
    # are not silently widened. Logic lives in scripts/fix-crlf.pl because
    # multi-line `run: |` blocks fail to parse on some Windows shells.
    - name: lf-fix
      glob: "*.{ts,tsx,js,mjs,cjs,json,jsonc,md,yml,yaml,py,pyp}"
      stage_fixed: true
      run: perl scripts/fix-crlf.pl {staged_files}
