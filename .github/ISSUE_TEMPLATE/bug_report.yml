name: Bug report
description: A tool behaves incorrectly, the bridge won't start, or a crash happens.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please include the information below so we can reproduce quickly.
        The bridge log lives at `%TEMP%/cinema4d_mcp_bridge.log` (Windows) or `$TMPDIR/cinema4d_mcp_bridge.log` (macOS).
  - type: input
    id: c4d-version
    attributes:
      label: Cinema 4D version
      placeholder: "e.g. 2026.0.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Windows 11 24H2 / macOS 14.4"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "output of `node -v`"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "e.g. Claude Desktop 0.9.2 / Claude Code"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact tool call (name + arguments) or chain of calls.
      placeholder: |
        1. call `create_object` with { type: "cube", name: "Foo" }
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: bridge-log
    attributes:
      label: Bridge log (relevant excerpt)
      description: Tail of `cinema4d_mcp_bridge.log`. Redact anything sensitive.
      render: text
  - type: textarea
    id: context
    attributes:
      label: Additional context
