name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  plugin-zip:
    name: Package bridge plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip plugin
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="cinema4d_mcp_bridge-${VERSION}.zip"
          cd plugin
          zip -r "../${ARCHIVE}" cinema4d_mcp_bridge
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${ARCHIVE}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
